name: 🚦 CI/CD Orchestrator

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # workflow_call:
    # inputs:
    #   classification:
    #     description: "Classification of the repository"
    #     required: true
    #     type: string
    #     default: "app-api"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

  
permissions:
  security-events: write
  packages: write
  contents: read

# ─────────────────────────────────────────────────────────────────
# Shared env vars inherited by all called workflows
# ─────────────────────────────────────────────────────────────────
env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  COVERAGE_THRESHOLD: "80"

jobs:

  # ── Stage 1: Fast checks (all parallel) ──────────────────────────
  fast-checks:
    name: "Stage 1 · Fast Checks"
    uses: ./.github/workflows/stage-1-fast-checks.yml
    secrets: inherit

  # ── Stage 2: Security scans (parallel, needs stage 1) ────────────
  security:
    name: "Stage 2 · Security"
    needs: fast-checks
    uses: ./.github/workflows/stage-2-security.yml
    secrets: inherit

  # ── Stage 3: Tests (sequential unit → integration → contract) ────
  tests:
    name: "Stage 3 · Tests"
    needs: fast-checks
    uses: ./.github/workflows/stage-3-tests.yml
    secrets: inherit

